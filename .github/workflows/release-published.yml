name: "Publish Release"
on:
  release:
    types: [published]
jobs:
  publish:
    needs: generate-token
    uses: gmvrpw/t15i/.github/workflows/nodejs-lib-release.yml@main
    with: 
      branch: ${{ github.event.repository.default_branch }}
      tag: ${{ github.event.release.tag_name }}
    secrets:
      RELEASE_BOT_ID: ${{ secrets.NODEJS_RELEASE_BOT_ID }}
      RELEASE_BOT_PRIVATE_KEY: ${{ secrets.NODEJS_RELEASE_BOT_PRIVATE_KEY }}
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
